<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Morphe Dashboard Wrapper</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .topbar {
      padding: 10px 14px;
      background: #0f4c81;
      color: white;
      font-size: 14px;
    }

    .frame-wrap {
      height: calc(100vh - 40px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .fallback {
      padding: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="topbar">Morphe Dashboard</div>

  <div class="frame-wrap">
    <iframe
      src="https://morphe-dashboard.web.app/"
      title="Morphe Dashboard"
      allowfullscreen>
    </iframe>
  </div>

  <div class="fallback">
    If the dashboard does not load, the source site may be blocking iframe embedding.
  </div>
</body>
</html>
